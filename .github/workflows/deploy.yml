name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      new_post: ${{ steps.check.outputs.new_post }}
      post_title: ${{ steps.check.outputs.post_title }}
      post_description: ${{ steps.check.outputs.post_description }}
      post_slug: ${{ steps.check.outputs.post_slug }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Check for new blog post
        id: check
        shell: bash
        run: |
          NEW_POST=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/blog/*.md' 'src/content/blog/*.mdx' | head -1)
          if [ -n "$NEW_POST" ]; then
            echo "new_post=true" >> "$GITHUB_OUTPUT"
            TITLE=$(python3 -c "
          import re, sys
          text = open('$NEW_POST').read()
          m = re.search(r'^title:\s*[\"'']?(.*?)[\"'']?\s*$', text, re.M)
          print(m.group(1) if m else '')
          ")
            DESC=$(python3 -c "
          import re, sys
          text = open('$NEW_POST').read()
          m = re.search(r'^description:\s*[\"'']?(.*?)[\"'']?\s*$', text, re.M)
          print(m.group(1) if m else '')
          ")
            SLUG=$(basename "$NEW_POST" | sed 's/\.\(md\|mdx\)$//')
            echo "post_title<<EOF" >> "$GITHUB_OUTPUT"
            echo "$TITLE" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "post_description<<EOF" >> "$GITHUB_OUTPUT"
            echo "$DESC" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "post_slug=$SLUG" >> "$GITHUB_OUTPUT"
          else
            echo "new_post=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: [build, deploy]
    if: needs.build.outputs.new_post == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POST_TITLE: ${{ needs.build.outputs.post_title }}
          POST_DESC: ${{ needs.build.outputs.post_description }}
          POST_SLUG: ${{ needs.build.outputs.post_slug }}
        run: |
          URL="https://laksarkhip.ru/blog/${POST_SLUG}/?utm_source=telegram&utm_medium=channel&utm_campaign=new_post"
          TEXT=$(printf '<b>%s</b>\n\n%s\n\n<a href="%s">Читать на сайте →</a>' "$POST_TITLE" "$POST_DESC" "$URL")

          curl -sf -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode text="$TEXT"
